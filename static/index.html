<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic RAG Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #FFF9E6 0%, #FFFACD 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 700px;
            height: 90vh;
            max-height: 800px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #F4D03F 0%, #F9E79F 100%);
            padding: 16px 20px;
            border-bottom: 1px solid #F5D547;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            display: flex;
            margin-bottom: 8px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message.bot {
            justify-content: flex-start;
        }
        
        .bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 14px;
        }
        
        .message.user .bubble {
            background: #F4D03F;
            color: #333;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }
        
        .message.bot .bubble {
            background: #F0F0F0;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        
        .input-section {
            border-top: 1px solid #EFEFEF;
            padding: 12px 16px;
            background: white;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .file-upload {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .file-input-wrapper {
            position: relative;
            flex: 1;
        }
        
        #fileInput {
            display: none;
        }
        
        .file-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 12px;
            background: #F9F9F9;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.2s;
            flex: 1;
        }
        
        .file-label:hover {
            background: #F5F5F5;
            border-color: #D0D0D0;
        }
        
        .upload-btn {
            padding: 8px 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .upload-btn:hover {
            background: #45a049;
        }
        
        .chat-input-area {
            display: flex;
            gap: 8px;
        }
        
        .chat-input-area input {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        .chat-input-area input:focus {
            outline: none;
            border-color: #F4D03F;
            box-shadow: 0 0 0 3px rgba(244, 208, 63, 0.1);
        }
        
        .send-btn {
            padding: 12px 20px;
            background: #F4D03F;
            color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .send-btn:hover {
            background: #F5D547;
            box-shadow: 0 2px 8px rgba(244, 208, 63, 0.3);
        }
        
        .send-btn:active {
            transform: scale(0.98);
        }
        
        .file-name {
            font-size: 12px;
            color: #666;
            padding: 0 8px;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #D0D0D0;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #B0B0B0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">💬 Arabic RAG Chatbot</div>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="message bot">
                <div class="bubble">مرحبًا! أنا مساعدك في الإجابة على أسئلتك. حمّل مستندًا أولاً ثم اسأل أي سؤال! 📚</div>
            </div>
        </div>
        
        <div class="input-section">
            <div class="file-upload">
                <div class="file-input-wrapper">
                    <input type="file" id="fileInput" accept=".pdf,.txt,.docx,.docs">
                    <label for="fileInput" class="file-label">
                        📄 اختر ملف (PDF, TXT, DOCX)
                    </label>
                </div>
                <button class="upload-btn" id="uploadBtn">تحميل</button>
            </div>
            <div id="fileName" class="file-name"></div>
            
            <div class="chat-input-area">
                <input 
                    type="text" 
                    id="chatInput" 
                    placeholder="اكتب سؤالك هنا..." 
                    autocomplete="off"
                >
                <button class="send-btn" id="sendBtn">إرسال</button>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileNameDisplay = document.getElementById('fileName');
        const fileLabel = document.querySelector('.file-label');

        function addMessage(type, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `<div class="bubble">${text}</div>`;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function updateFileLabel() {
            if (fileInput.files.length > 0) {
                const fileName = fileInput.files[0].name;
                fileNameDisplay.textContent = `✓ تم تحديد: ${fileName}`;
                fileLabel.textContent = '📄 اختر ملف آخر (اختياري)';
            } else {
                fileNameDisplay.textContent = '';
                fileLabel.textContent = '📄 اختر ملف (PDF, TXT, DOCX)';
            }
        }

        fileInput.addEventListener('change', updateFileLabel);

        sendBtn.addEventListener('click', async () => {
            const question = chatInput.value.trim();
            if (!question) return;

            addMessage('user', question);
            chatInput.value = '';
            sendBtn.disabled = true;

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });

                const data = await response.json();
                if (response.ok) {
                    addMessage('bot', data.answer);
                } else {
                    addMessage('bot', `❌ خطأ: ${data.detail || 'حدث خطأ ما'}`);
                }
            } catch (error) {
                console.error('Error:', error);
                addMessage('bot', '❌ خطأ في الاتصال بالخادم');
            } finally {
                sendBtn.disabled = false;
                chatInput.focus();
            }
        });

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });

        uploadBtn.addEventListener('click', async () => {
            const file = fileInput.files[0];
            if (!file) {
                addMessage('bot', '⚠️ الرجاء اختيار ملف أولاً');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);
            
            addMessage('bot', `⏳ جاري تحميل ومعالجة: ${file.name}...`);
            uploadBtn.disabled = true;

            try {
                const response = await fetch('/documents/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (response.ok) {
                    addMessage('bot', `✅ تمت المعالجة! تم إنشاء ${data.chunk_count || '?'} أجزاء من المستند.`);
                    fileInput.value = '';
                    updateFileLabel();
                } else {
                    addMessage('bot', `❌ خطأ: ${data.detail || 'فشل التحميل'}`);
                }
            } catch (error) {
                console.error('Error:', error);
                addMessage('bot', '❌ خطأ في تحميل المستند');
            } finally {
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
