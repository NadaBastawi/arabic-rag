version: '3.8'

services:
  arabic-rag:
    build: .
    ports:
      - "8000:8000"      # FastAPI server port
      - "7860:7860"      # Gradio UI port
    environment:
      - EMBEDDING_MODEL=intfloat/multilingual-e5-large
      - EMBEDDING_DEVICE=cpu
      - LLM_MODEL=gemini-2.0-flash
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_TEMPERATURE=0.3
      - LLM_MAX_TOKENS=2048
      - RETRIEVAL_MODE=multi_stage
      - USE_ADAPTIVE=true
      - INDEX_PATH=/app/data/index
      - DOCS_PATH=/app/data/documents
      - LOG_LEVEL=INFO
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - GRADIO_PORT=7860
      - GRADIO_SHARE=false
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  data:
  logs:
